<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f2ece1;
    --cream-deep: #ebe3d4;
    --paper: #f8f4ec;
    --ink: #1f1b18;
    --ink-soft: #4a423c;
    --ink-mute: #8a807a;
    --line: #d9cfbf;
    --line-soft: #e6ddcc;
    --bordeaux: #7a1f2b;
    --bordeaux-soft: #9c3845;
    --gold: #b8894b;
    --shadow: 0 1px 2px rgba(31, 27, 24, 0.04), 0 8px 24px rgba(31, 27, 24, 0.06);
    --radius: 4px;
    --radius-lg: 10px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    font-feature-settings: 'ss01', 'ss02';
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top left, rgba(184, 137, 75, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(122, 31, 43, 0.03) 0%, transparent 50%);
  }

  .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    letter-spacing: -0.01em;
  }

  .app {
    display: grid;
    grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ---------- CALENDAR PANEL ---------- */
  .cal-panel {
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 1px solid var(--line);
  }

  .cal-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 16px;
  }

  .cal-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cal-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  .cal-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 44px;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.02em;
  }

  .cal-title .year {
    font-style: italic;
    color: var(--bordeaux);
    font-weight: 400;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    transition: all 0.15s ease;
  }

  .nav-btn:hover {
    background: var(--cream);
    border-color: var(--ink-soft);
    color: var(--ink);
  }

  .nav-btn:active {
    transform: scale(0.96);
  }

  .today-btn {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 14px;
    height: 36px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--ink-soft);
    margin-right: 8px;
    transition: all 0.15s ease;
  }

  .today-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }

  .weekday {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    text-align: center;
  }

  .weekday.weekend {
    color: var(--bordeaux);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    flex: 1;
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 0;
  }

  .day {
    background: var(--paper);
    padding: 8px 10px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: background 0.12s ease;
    min-height: 0;
    overflow: hidden;
  }

  .day:hover {
    background: var(--cream);
  }

  .day.other-month {
    background: #f4efe6;
  }

  .day.other-month .day-num {
    color: #c7bcad;
  }

  .day.today .day-num {
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: -4px;
  }

  .day.selected {
    background: var(--cream-deep);
    box-shadow: inset 0 0 0 2px var(--bordeaux);
  }

  .day.selected.today .day-num {
    background: var(--bordeaux);
  }

  .day-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 4px;
    transition: all 0.15s ease;
  }

  .day-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    flex: 1;
  }

  .day-event {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 2px 6px;
    background: var(--cream);
    border-left: 2px solid var(--bordeaux);
    border-radius: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .day.selected .day-event {
    background: var(--paper);
  }

  .day-more {
    font-size: 10px;
    color: var(--ink-mute);
    font-weight: 600;
    padding: 0 6px;
    letter-spacing: 0.04em;
  }

  .has-note-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* ---------- DETAIL PANEL ---------- */
  .detail-panel {
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--paper);
    overflow-y: auto;
  }

  .detail-header {
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }

  .detail-weekday {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }

  .detail-date {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 52px;
    font-weight: 300;
    line-height: 0.95;
    color: var(--ink);
    display: flex;
    align-items: baseline;
    gap: 12px;
    letter-spacing: -0.03em;
  }

  .detail-date .num {
    font-size: 72px;
    font-weight: 300;
  }

  .detail-date .month {
    font-style: italic;
    color: var(--bordeaux);
    font-weight: 400;
  }

  .section {
    margin-bottom: 32px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line-soft);
  }

  .event-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--cream);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    transition: all 0.15s ease;
    margin-bottom: 14px;
  }

  .event-input-wrap:focus-within {
    background: var(--paper);
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(31, 27, 24, 0.05);
  }

  .event-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }

  .event-input::placeholder {
    color: var(--ink-mute);
    font-style: italic;
  }

  .add-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .add-btn:hover {
    background: var(--bordeaux);
    transform: scale(1.08);
  }

  .add-btn:active {
    transform: scale(0.95);
  }

  .events-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .event-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    transition: all 0.15s ease;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-item:hover {
    border-color: var(--ink-soft);
    background: var(--cream);
  }

  .event-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--bordeaux);
    flex-shrink: 0;
  }

  .event-text {
    flex: 1;
    font-size: 14px;
    color: var(--ink);
    word-break: break-word;
  }

  .event-remove {
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .event-item:hover .event-remove {
    opacity: 1;
  }

  .event-remove:hover {
    background: var(--bordeaux);
    color: var(--paper);
  }

  .empty-events {
    padding: 16px 0;
    font-size: 13px;
    color: var(--ink-mute);
    font-style: italic;
    font-family: 'Fraunces', Georgia, serif;
  }

  .notes-textarea {
    width: 100%;
    min-height: 140px;
    border: 1px solid var(--line-soft);
    background: var(--paper);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: all 0.15s ease;
  }

  .notes-textarea:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(31, 27, 24, 0.05);
  }

  .notes-textarea::placeholder {
    color: var(--ink-mute);
    font-style: italic;
  }

  .save-indicator {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-weight: 600;
  }

  .save-indicator.visible {
    opacity: 1;
  }

  /* scrollbar */
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 900px) {
    html, body { overflow: auto; }

    .app {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }

    .cal-panel {
      padding: 24px 20px 20px;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }

    .cal-header {
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .cal-title {
      font-size: 32px;
    }

    .days-grid {
      min-height: 340px;
    }

    .day {
      padding: 4px 5px;
      min-height: 48px;
    }

    .day-num {
      font-size: 14px;
    }

    .day.today .day-num {
      width: 22px;
      height: 22px;
      font-size: 12px;
      margin-left: -2px;
    }

    .day-event {
      font-size: 0;
      padding: 0;
      height: 3px;
      border-left: none;
      background: var(--bordeaux);
      border-radius: 2px;
      margin-top: 1px;
    }

    .day-more {
      display: none;
    }

    .detail-panel {
      padding: 24px 20px 40px;
      overflow-y: visible;
    }

    .detail-date {
      font-size: 36px;
    }

    .detail-date .num {
      font-size: 52px;
    }

    .event-remove {
      opacity: 1;
    }

    .today-btn {
      font-size: 10px;
      padding: 0 10px;
    }
  }

  @media (max-width: 420px) {
    .cal-panel, .detail-panel {
      padding-left: 16px;
      padding-right: 16px;
    }
    .cal-title { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- CALENDAR PANEL -->
  <section class="cal-panel">
    <header class="cal-header">
      <div class="cal-title-wrap">
        <span class="cal-eyebrow">Calendario</span>
        <h1 class="cal-title" id="calTitle"></h1>
      </div>
      <div class="cal-nav">
        <button class="today-btn" id="todayBtn">Oggi</button>
        <button class="nav-btn" id="prevBtn" aria-label="Mese precedente">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="Mese successivo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="weekdays" id="weekdays"></div>
    <div class="days-grid" id="daysGrid"></div>
  </section>

  <!-- DETAIL PANEL -->
  <section class="detail-panel">
    <header class="detail-header">
      <div class="detail-weekday" id="detailWeekday"></div>
      <div class="detail-date" id="detailDate"></div>
    </header>

    <div class="section">
      <div class="section-label">Impegni</div>
      <div class="event-input-wrap">
        <input
          type="text"
          class="event-input"
          id="eventInput"
          placeholder="Aggiungi un impegno…"
          maxlength="200"
        >
        <button class="add-btn" id="addEventBtn" aria-label="Aggiungi impegno">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 2V10M2 6H10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="events-list" id="eventsList"></div>
    </div>

    <div class="section">
      <div class="section-label">Note</div>
      <textarea
        class="notes-textarea"
        id="notesArea"
        placeholder="Scrivi qui i tuoi pensieri per questa giornata…"
      ></textarea>
      <div class="save-indicator" id="saveIndicator">Salvato</div>
    </div>
  </section>
</div>

<script>
  // ============ STATE ============
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const WEEKDAYS_SHORT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const WEEKDAYS_LONG = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

  const today = new Date();
  today.setHours(0,0,0,0);

  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();
  let selectedDate = fmtDate(today);

  let events = {};   // { 'YYYY-MM-DD': [ 'text', ... ] }
  let notes = {};    // { 'YYYY-MM-DD': 'text' }

  // ============ STORAGE (localStorage) ============
  function loadData() {
    try {
      const e = localStorage.getItem('calendar:events');
      if (e) events = JSON.parse(e);
    } catch (err) { events = {}; }
    try {
      const n = localStorage.getItem('calendar:notes');
      if (n) notes = JSON.parse(n);
    } catch (err) { notes = {}; }
  }

  function saveEvents() {
    try { localStorage.setItem('calendar:events', JSON.stringify(events)); }
    catch (err) { console.error('Errore salvataggio impegni', err); }
  }

  function saveNotes() {
    try { localStorage.setItem('calendar:notes', JSON.stringify(notes)); }
    catch (err) { console.error('Errore salvataggio note', err); }
  }

  // ============ UTILS ============
  function fmtDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function parseDate(str) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  // ISO weekday (Mon=0..Sun=6)
  function isoWeekday(d) {
    return (d.getDay() + 6) % 7;
  }

  // ============ RENDER ============
  function renderWeekdays() {
    const el = document.getElementById('weekdays');
    el.innerHTML = WEEKDAYS_SHORT.map((w,i) =>
      `<div class="weekday${i>=5?' weekend':''}">${w}</div>`
    ).join('');
  }

  function renderCalendar() {
    document.getElementById('calTitle').innerHTML =
      `${MONTHS[viewMonth]} <span class="year">${viewYear}</span>`;

    const first = new Date(viewYear, viewMonth, 1);
    const firstWeekday = isoWeekday(first);
    const gridStart = new Date(viewYear, viewMonth, 1 - firstWeekday);

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      const key = fmtDate(d);
      const isOther = d.getMonth() !== viewMonth;
      const isToday = d.getTime() === today.getTime();
      const isSel = key === selectedDate;

      const dayEvents = events[key] || [];
      const hasNote = notes[key] && notes[key].trim().length > 0;

      const cell = document.createElement('div');
      cell.className = 'day' +
        (isOther ? ' other-month' : '') +
        (isToday ? ' today' : '') +
        (isSel ? ' selected' : '');
      cell.dataset.date = key;

      let evHtml = '';
      const maxShow = window.innerWidth <= 900 ? 3 : 2;
      const shown = dayEvents.slice(0, maxShow);
      shown.forEach(ev => {
        evHtml += `<div class="day-event">${escapeHtml(ev)}</div>`;
      });
      if (dayEvents.length > maxShow) {
        evHtml += `<div class="day-more">+${dayEvents.length - maxShow}</div>`;
      }

      cell.innerHTML = `
        <div class="day-num">${d.getDate()}</div>
        <div class="day-events">${evHtml}</div>
        ${hasNote ? '<div class="has-note-dot"></div>' : ''}
      `;

      cell.addEventListener('click', () => selectDay(key));
      grid.appendChild(cell);
    }
  }

  function renderDetail() {
    const d = parseDate(selectedDate);
    document.getElementById('detailWeekday').textContent = WEEKDAYS_LONG[isoWeekday(d)];
    document.getElementById('detailDate').innerHTML =
      `<span class="num">${d.getDate()}</span><span class="month serif">${MONTHS[d.getMonth()].toLowerCase()}</span>`;

    const list = document.getElementById('eventsList');
    const dayEvents = events[selectedDate] || [];

    if (dayEvents.length === 0) {
      list.innerHTML = '<div class="empty-events">Nessun impegno per oggi.</div>';
    } else {
      list.innerHTML = dayEvents.map((ev, i) => `
        <div class="event-item">
          <div class="event-bullet"></div>
          <div class="event-text">${escapeHtml(ev)}</div>
          <button class="event-remove" data-idx="${i}" aria-label="Rimuovi">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `).join('');

      list.querySelectorAll('.event-remove').forEach(btn => {
        btn.addEventListener('click', () => removeEvent(parseInt(btn.dataset.idx)));
      });
    }

    document.getElementById('notesArea').value = notes[selectedDate] || '';
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ============ ACTIONS ============
  function selectDay(key) {
    selectedDate = key;
    const d = parseDate(key);
    if (d.getMonth() !== viewMonth || d.getFullYear() !== viewYear) {
      viewMonth = d.getMonth();
      viewYear = d.getFullYear();
    }
    renderCalendar();
    renderDetail();
    if (window.innerWidth <= 900) {
      document.querySelector('.detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function prevMonth() {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  }

  function nextMonth() {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  }

  function goToday() {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    selectedDate = fmtDate(today);
    renderCalendar();
    renderDetail();
  }

  function addEvent() {
    const input = document.getElementById('eventInput');
    const text = input.value.trim();
    if (!text) return;
    if (!events[selectedDate]) events[selectedDate] = [];
    events[selectedDate].push(text);
    input.value = '';
    renderDetail();
    renderCalendar();
    saveEvents();
  }

  function removeEvent(idx) {
    if (!events[selectedDate]) return;
    events[selectedDate].splice(idx, 1);
    if (events[selectedDate].length === 0) delete events[selectedDate];
    renderDetail();
    renderCalendar();
    saveEvents();
  }

  let noteTimer = null;
  function onNoteInput(e) {
    const val = e.target.value;
    if (val.trim()) notes[selectedDate] = val;
    else delete notes[selectedDate];

    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => {
      saveNotes();
      renderCalendar();
      const ind = document.getElementById('saveIndicator');
      ind.classList.add('visible');
      setTimeout(() => ind.classList.remove('visible'), 1200);
    }, 500);
  }

  // ============ EVENT LISTENERS ============
  document.getElementById('prevBtn').addEventListener('click', prevMonth);
  document.getElementById('nextBtn').addEventListener('click', nextMonth);
  document.getElementById('todayBtn').addEventListener('click', goToday);
  document.getElementById('addEventBtn').addEventListener('click', addEvent);

  document.getElementById('eventInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addEvent(); }
  });

  document.getElementById('notesArea').addEventListener('input', onNoteInput);

  // keyboard nav
  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') prevMonth();
    else if (e.key === 'ArrowRight') nextMonth();
    else if (e.key === 't' || e.key === 'T') goToday();
  });

  // re-render on resize (mobile/desktop event display differs)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderCalendar, 150);
  });

  // ============ INIT ============
  (function init() {
    renderWeekdays();
    loadData();
    renderCalendar();
    renderDetail();
  })();
</script>

</body>
</html>
