<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f2ece1;
    --cream-deep: #ebe3d4;
    --paper: #f8f4ec;
    --ink: #1f1b18;
    --ink-soft: #4a423c;
    --ink-mute: #8a807a;
    --line: #d9cfbf;
    --line-soft: #e6ddcc;
    --bordeaux: #7a1f2b;
    --bordeaux-soft: #9c3845;
    --gold: #b8894b;
    --green: #5a7a4c;
    --radius: 4px;
    --radius-lg: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top left, rgba(184, 137, 75, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(122, 31, 43, 0.03) 0%, transparent 50%);
  }

  .serif { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.01em; }

  /* ====== AUTH ====== */
  .auth-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; padding: 24px;
  }
  .auth-card { max-width: 380px; width: 100%; text-align: center; }
  .auth-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 14px; }
  .auth-title { font-family: 'Fraunces', Georgia, serif; font-size: 56px; font-weight: 300; line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 16px; }
  .auth-title .accent { font-style: italic; color: var(--bordeaux); }
  .auth-text { font-family: 'Fraunces', Georgia, serif; font-size: 16px; line-height: 1.5; color: var(--ink-soft); margin-bottom: 28px; }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-input {
    width: 100%; padding: 14px 16px; border: 1px solid var(--line);
    background: var(--paper); border-radius: var(--radius); font-family: inherit;
    font-size: 15px; color: var(--ink); outline: none; transition: all 0.15s ease; text-align: center;
  }
  .auth-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(31,27,24,0.05); }
  .auth-input::placeholder { color: var(--ink-mute); font-style: italic; }
  .auth-btn {
    padding: 14px 20px; border: none; background: var(--ink); color: var(--paper);
    border-radius: var(--radius); font-family: inherit; font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.15s ease;
  }
  .auth-btn:hover:not(:disabled) { background: var(--bordeaux); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-btn.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .auth-btn.secondary:hover:not(:disabled) { background: var(--cream); border-color: var(--ink-soft); }
  .auth-msg { margin-top: 16px; font-size: 13px; font-family: 'Fraunces', Georgia, serif; line-height: 1.5; min-height: 20px; }
  .auth-msg.success { color: var(--green); }
  .auth-msg.error { color: var(--bordeaux); }
  .auth-msg.loading { color: var(--ink-mute); font-style: italic; }

  /* ====== MAIN APP ====== */
  .app {
    display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
    height: 100vh; max-width: 1400px; margin: 0 auto;
  }

  .cal-panel {
    padding: 40px 48px; display: flex; flex-direction: column;
    min-height: 0; border-right: 1px solid var(--line);
  }
  .cal-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
  .cal-title-wrap { display: flex; flex-direction: column; gap: 2px; }
  .cal-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); display: flex; align-items: center; gap: 8px; }

  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .sync-dot.offline { background: var(--ink-mute); animation: none; }
  .sync-dot.saving { background: var(--gold); animation: none; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(90,122,76,0)} 50%{box-shadow:0 0 0 4px rgba(90,122,76,0.15)} }

  .cal-title { font-family:'Fraunces',Georgia,serif; font-size:44px; font-weight:300; line-height:1; letter-spacing:-0.02em; }
  .cal-title .year { font-style:italic; color:var(--bordeaux); font-weight:400; }
  .cal-nav { display:flex; align-items:center; gap:4px; }

  .nav-btn {
    width:36px; height:36px; border:1px solid var(--line); background:transparent;
    border-radius:var(--radius); cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:var(--ink-soft); transition:all 0.15s ease;
  }
  .nav-btn:hover { background:var(--cream); border-color:var(--ink-soft); color:var(--ink); }
  .nav-btn:active { transform:scale(0.96); }

  .today-btn,.logout-btn {
    font-family:'Manrope',sans-serif; font-size:11px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; padding:0 14px; height:36px;
    border:1px solid var(--line); background:transparent; border-radius:var(--radius);
    cursor:pointer; color:var(--ink-soft); margin-right:8px; transition:all 0.15s ease;
  }
  .today-btn:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .logout-btn:hover { background:var(--bordeaux); color:var(--paper); border-color:var(--bordeaux); }

  .weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:8px; border-bottom:1px solid var(--line); padding-bottom:10px; }
  .weekday { font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-mute); text-align:center; }
  .weekday.weekend { color:var(--bordeaux); }

  .days-grid {
    display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:1fr; flex:1;
    gap:1px; background:var(--line-soft); border:1px solid var(--line-soft);
    border-radius:var(--radius); overflow:hidden; min-height:0;
  }
  .day {
    background:var(--paper); padding:8px 10px; cursor:pointer; position:relative;
    display:flex; flex-direction:column; transition:background 0.12s ease; min-height:0; overflow:hidden;
  }
  .day:hover { background:var(--cream); }
  .day.other-month { background:#f4efe6; }
  .day.other-month .day-num { color:#c7bcad; }
  .day.today .day-num {
    background:var(--ink); color:var(--paper); border-radius:50%;
    width:26px; height:26px; display:flex; align-items:center; justify-content:center; margin-left:-4px;
  }
  .day.selected { background:var(--cream-deep); box-shadow:inset 0 0 0 2px var(--bordeaux); }
  .day.selected.today .day-num { background:var(--bordeaux); }
  .day-num { font-family:'Fraunces',Georgia,serif; font-size:18px; font-weight:400; margin-bottom:4px; }
  .day-events { display:flex; flex-direction:column; gap:2px; overflow:hidden; flex:1; }
  .day-event {
    font-size:11px; font-weight:500; color:var(--ink-soft); padding:2px 6px;
    background:var(--cream); border-left:2px solid var(--bordeaux); border-radius:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3;
  }
  .day-event .ev-time { color:var(--bordeaux); font-weight:600; margin-right:4px; font-size:10px; }
  .day.selected .day-event { background:var(--paper); }
  .day-more { font-size:10px; color:var(--ink-mute); font-weight:600; padding:0 6px; }
  .has-note-dot { position:absolute; top:8px; right:8px; width:5px; height:5px; border-radius:50%; background:var(--gold); }
  .has-attach-dot { position:absolute; top:8px; right:16px; width:5px; height:5px; border-radius:50%; background:var(--bordeaux); }

  /* ====== DETAIL ====== */
  .detail-panel {
    padding:40px 48px; display:flex; flex-direction:column;
    min-height:0; background:var(--paper); overflow-y:auto;
  }
  .detail-header { padding-bottom:24px; border-bottom:1px solid var(--line); margin-bottom:24px; }
  .detail-weekday { font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .detail-date {
    font-family:'Fraunces',Georgia,serif; font-size:52px; font-weight:300;
    line-height:0.95; display:flex; align-items:baseline; gap:12px; letter-spacing:-0.03em;
  }
  .detail-date .num { font-size:72px; font-weight:300; }
  .detail-date .month { font-style:italic; color:var(--bordeaux); font-weight:400; }

  .section { margin-bottom: 28px; }
  .section-label {
    font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--line-soft); }

  /* Event input */
  .event-input-row { display:flex; gap:8px; margin-bottom:14px; }
  .event-input-wrap {
    display:flex; align-items:center; gap:8px; padding:10px 12px; flex:1;
    background:var(--cream); border:1px solid var(--line-soft); border-radius:var(--radius); transition:all 0.15s ease;
  }
  .event-input-wrap:focus-within { background:var(--paper); border-color:var(--ink); box-shadow:0 0 0 3px rgba(31,27,24,0.05); }
  .event-input { flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; color:var(--ink); outline:none; min-width:0; }
  .event-input::placeholder { color:var(--ink-mute); font-style:italic; }

  .time-input {
    width:56px; border:none; background:transparent; font-family:inherit; font-size:13px;
    color:var(--bordeaux); outline:none; text-align:center; font-weight:600;
  }
  .time-input::-webkit-calendar-picker-indicator { opacity:0.4; cursor:pointer; }

  .notify-toggle {
    width:22px; height:22px; border:1px solid var(--line); background:transparent;
    border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--ink-mute); transition:all 0.15s ease; flex-shrink:0; font-size:12px;
  }
  .notify-toggle:hover { border-color:var(--gold); color:var(--gold); }
  .notify-toggle.active { background:var(--gold); border-color:var(--gold); color:var(--paper); }

  .add-btn {
    width:42px; height:42px; border:none; background:var(--ink); color:var(--paper);
    border-radius:var(--radius); cursor:pointer; display:flex; align-items:center;
    justify-content:center; transition:all 0.15s ease; flex-shrink:0;
  }
  .add-btn:hover { background:var(--bordeaux); }
  .add-btn:active { transform:scale(0.95); }

  .events-list { display:flex; flex-direction:column; gap:6px; }
  .event-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:var(--paper); border:1px solid var(--line-soft); border-radius:var(--radius);
    transition:all 0.15s ease; animation:slideIn 0.25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .event-item:hover { border-color:var(--ink-soft); background:var(--cream); }
  .event-bullet { width:6px; height:6px; border-radius:50%; background:var(--bordeaux); flex-shrink:0; }
  .event-bullet.has-notify { background:var(--gold); box-shadow:0 0 0 2px rgba(184,137,75,0.25); }
  .ev-item-time { font-size:12px; font-weight:600; color:var(--bordeaux); min-width:40px; }
  .event-text { flex:1; font-size:14px; word-break:break-word; }
  .event-remove {
    width:22px; height:22px; border:none; background:transparent; color:var(--ink-mute);
    cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:all 0.15s ease; flex-shrink:0;
  }
  .event-item:hover .event-remove { opacity:1; }
  .event-remove:hover { background:var(--bordeaux); color:var(--paper); }
  .empty-events { padding:16px 0; font-size:13px; color:var(--ink-mute); font-style:italic; font-family:'Fraunces',Georgia,serif; }

  /* ====== RICH TEXT EDITOR ====== */
  .editor-toolbar {
    display:flex; gap:2px; padding:6px 8px; background:var(--cream);
    border:1px solid var(--line-soft); border-bottom:none; border-radius:var(--radius) var(--radius) 0 0;
  }
  .tb-btn {
    width:28px; height:28px; border:none; background:transparent; border-radius:3px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--ink-soft); font-size:13px; transition:all 0.12s ease;
  }
  .tb-btn:hover { background:var(--paper); color:var(--ink); }
  .tb-btn.active { background:var(--ink); color:var(--paper); }
  .tb-sep { width:1px; background:var(--line); margin:4px 4px; }

  .notes-editor {
    width:100%; min-height:130px; max-height:260px; overflow-y:auto;
    border:1px solid var(--line-soft); background:var(--paper);
    border-radius:0 0 var(--radius) var(--radius); padding:14px 16px;
    font-family:'Fraunces',Georgia,serif; font-size:15px; line-height:1.6;
    color:var(--ink); outline:none; transition:border-color 0.15s ease;
  }
  .notes-editor:focus { border-color:var(--ink); box-shadow:0 0 0 3px rgba(31,27,24,0.05); }
  .notes-editor:empty::before {
    content:attr(data-placeholder); color:var(--ink-mute); font-style:italic; pointer-events:none;
  }
  .notes-editor b, .notes-editor strong { font-weight:600; }
  .notes-editor i, .notes-editor em { font-style:italic; }
  .notes-editor ul, .notes-editor ol { padding-left:20px; margin:4px 0; }

  /* ====== ATTACHMENTS ====== */
  .attach-area { margin-top:14px; }
  .attach-upload-btn {
    display:inline-flex; align-items:center; gap:6px; padding:8px 14px;
    border:1px dashed var(--line); background:transparent; border-radius:var(--radius);
    cursor:pointer; font-family:inherit; font-size:12px; font-weight:500;
    color:var(--ink-mute); transition:all 0.15s ease;
  }
  .attach-upload-btn:hover { border-color:var(--ink-soft); color:var(--ink-soft); background:var(--cream); }
  .attach-list { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
  .attach-item {
    display:flex; align-items:center; gap:10px; padding:8px 12px;
    background:var(--cream); border-radius:var(--radius); animation:slideIn 0.2s ease;
  }
  .attach-icon { font-size:14px; flex-shrink:0; }
  .attach-name {
    flex:1; font-size:13px; color:var(--ink-soft); overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;
  }
  .attach-name a { color:var(--ink-soft); text-decoration:none; border-bottom:1px solid var(--line-soft); }
  .attach-name a:hover { color:var(--bordeaux); border-color:var(--bordeaux); }
  .attach-size { font-size:11px; color:var(--ink-mute); flex-shrink:0; }
  .attach-del {
    width:18px; height:18px; border:none; background:transparent; color:var(--ink-mute);
    cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:10px; opacity:0; transition:all 0.12s ease;
  }
  .attach-item:hover .attach-del { opacity:1; }
  .attach-del:hover { background:var(--bordeaux); color:var(--paper); }

  .global-loader {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--paper); z-index:100; font-family:'Fraunces',Georgia,serif;
    font-style:italic; color:var(--ink-mute); font-size:14px;
  }

  .detail-panel::-webkit-scrollbar { width:6px; }
  .detail-panel::-webkit-scrollbar-track { background:transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }

  /* ====== MOBILE ====== */
  @media (max-width:900px) {
    html,body { overflow:auto; }
    .app { grid-template-columns:1fr; height:auto; min-height:100vh; }
    .cal-panel { padding:24px 20px 20px; border-right:none; border-bottom:1px solid var(--line); }
    .cal-header { margin-bottom:20px; flex-wrap:wrap; }
    .cal-title { font-size:32px; }
    .days-grid { min-height:340px; }
    .day { padding:4px 5px; min-height:48px; }
    .day-num { font-size:14px; }
    .day.today .day-num { width:22px; height:22px; font-size:12px; margin-left:-2px; }
    .day-event { font-size:0; padding:0; height:3px; border-left:none; background:var(--bordeaux); border-radius:2px; margin-top:1px; }
    .day-more { display:none; }
    .detail-panel { padding:24px 20px 40px; overflow-y:visible; }
    .detail-date { font-size:36px; }
    .detail-date .num { font-size:52px; }
    .event-remove { opacity:1; }
    .attach-del { opacity:1; }
    .today-btn,.logout-btn { font-size:10px; padding:0 10px; }
    .auth-title { font-size:44px; }
    .event-input-row { flex-wrap:wrap; }
  }
  @media (max-width:420px) {
    .cal-panel,.detail-panel { padding-left:16px; padding-right:16px; }
    .cal-title { font-size:28px; }
  }
</style>
</head>
<body>

<div class="global-loader" id="globalLoader">Caricamento…</div>

<div class="auth-screen" id="authScreen" style="display:none">
  <div class="auth-card">
    <div class="auth-eyebrow">Calendario</div>
    <h1 class="auth-title">Il tuo <span class="accent">tempo</span>.</h1>
    <p class="auth-text">Accedi con email e password.</p>
    <div class="auth-form">
      <input type="email" class="auth-input" id="authEmail" placeholder="tu@email.it" autocomplete="email">
      <input type="password" class="auth-input" id="authPassword" placeholder="Password" autocomplete="current-password">
      <button class="auth-btn" id="authLogin">Accedi</button>
      <button class="auth-btn secondary" id="authSignup">Crea account</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <section class="cal-panel">
    <header class="cal-header">
      <div class="cal-title-wrap">
        <span class="cal-eyebrow"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Sincronizzato</span></span>
        <h1 class="cal-title" id="calTitle"></h1>
      </div>
      <div class="cal-nav">
        <button class="logout-btn" id="logoutBtn">Esci</button>
        <button class="today-btn" id="todayBtn">Oggi</button>
        <button class="nav-btn" id="prevBtn" aria-label="Mese precedente">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="Mese successivo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>
    <div class="weekdays" id="weekdays"></div>
    <div class="days-grid" id="daysGrid"></div>
  </section>

  <section class="detail-panel">
    <header class="detail-header">
      <div>
        <div class="detail-weekday" id="detailWeekday"></div>
        <div class="detail-date" id="detailDate"></div>
      </div>
    </header>

    <!-- IMPEGNI -->
    <div class="section">
      <div class="section-label">Impegni</div>
      <div class="event-input-row">
        <div class="event-input-wrap">
          <input type="text" class="event-input" id="eventInput" placeholder="Aggiungi un impegno…" maxlength="200">
          <input type="time" class="time-input" id="eventTime" title="Orario (opzionale)">
          <button class="notify-toggle" id="notifyToggle" title="Attiva notifica browser">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 14.5c.83 0 1.5-.67 1.5-1.5h-3c0 .83.67 1.5 1.5 1.5zM13 10V6.5C13 4.01 11.49 2 9.17 1.5V1a1.17 1.17 0 00-2.34 0v.5C4.51 2 3 4.01 3 6.5V10l-1.5 1.5V13h13v-1.5L13 10z" fill="currentColor"/></svg>
          </button>
        </div>
        <button class="add-btn" id="addEventBtn" aria-label="Aggiungi">
          <svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M6 2V10M2 6H10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="events-list" id="eventsList"></div>
    </div>

    <!-- NOTE (Rich Text) -->
    <div class="section">
      <div class="section-label">Note</div>
      <div class="editor-toolbar" id="editorToolbar">
        <button class="tb-btn" data-cmd="bold" title="Grassetto"><b>B</b></button>
        <button class="tb-btn" data-cmd="italic" title="Corsivo"><i>I</i></button>
        <button class="tb-btn" data-cmd="underline" title="Sottolineato"><u>U</u></button>
        <button class="tb-btn" data-cmd="strikeThrough" title="Barrato"><s>S</s></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="insertUnorderedList" title="Elenco puntato">•</button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="Elenco numerato">1.</button>
      </div>
      <div class="notes-editor" id="notesEditor" contenteditable="true" data-placeholder="Scrivi qui i tuoi pensieri per questa giornata…"></div>
    </div>

    <!-- ALLEGATI -->
    <div class="section">
      <div class="section-label">Allegati</div>
      <input type="file" id="fileInput" multiple hidden>
      <button class="attach-upload-btn" id="uploadBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 5l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 12v2h14v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Carica file
      </button>
      <div class="attach-list" id="attachList"></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL = 'https://kifcvnfgaoytxnnwawzk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_E_acc_xLnG9cru-m6_SoIA_Uzxg9GWe';
  // ============================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const WD_S = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const WD_L = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

  const today = new Date(); today.setHours(0,0,0,0);
  let viewYear = today.getFullYear(), viewMonth = today.getMonth();
  let selectedDate = fmtDate(today);
  let currentUser = null;
  let events = {}, notes = {}, attachments = {};
  let realtimeChannel = null;
  let notifiedEvents = new Set();

  // ====== UTILS ======
  function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function parseDate(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  function isoWd(d){ return (d.getDay()+6)%7; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtSize(b){ if(b<1024)return b+'B'; if(b<1048576)return(b/1024).toFixed(0)+'KB'; return(b/1048576).toFixed(1)+'MB'; }

  function setSyncStatus(s){
    const d=document.getElementById('syncDot'),l=document.getElementById('syncLabel');
    d.className='sync-dot';
    if(s==='saving'){d.classList.add('saving');l.textContent='Salvataggio…';}
    else if(s==='offline'){d.classList.add('offline');l.textContent='Errore di rete';}
    else{l.textContent='Sincronizzato';}
  }

  // ====== AUTH ======
  function showAuthMsg(t,type){const m=document.getElementById('authMsg');m.className='auth-msg '+type;m.textContent=t;}

  async function handleLogin(){
    const email=document.getElementById('authEmail').value.trim();
    const pw=document.getElementById('authPassword').value;
    if(!email||!email.includes('@')){showAuthMsg('Inserisci un email valida.','error');return;}
    if(!pw||pw.length<6){showAuthMsg('Password: almeno 6 caratteri.','error');return;}
    document.getElementById('authLogin').disabled=true;
    showAuthMsg('Accesso…','loading');
    const{error}=await sb.auth.signInWithPassword({email,password:pw});
    document.getElementById('authLogin').disabled=false;
    if(error)showAuthMsg('Errore: '+error.message,'error');
  }

  async function handleSignup(){
    const email=document.getElementById('authEmail').value.trim();
    const pw=document.getElementById('authPassword').value;
    if(!email||!email.includes('@')){showAuthMsg('Inserisci un email valida.','error');return;}
    if(!pw||pw.length<6){showAuthMsg('Password: almeno 6 caratteri.','error');return;}
    document.getElementById('authSignup').disabled=true;
    showAuthMsg('Creazione account…','loading');
    const{error}=await sb.auth.signUp({email,password:pw});
    document.getElementById('authSignup').disabled=false;
    if(error)showAuthMsg('Errore: '+error.message,'error');
    else showAuthMsg('Account creato! Clicca "Accedi".','success');
  }

  async function handleLogout(){
    if(realtimeChannel){await sb.removeChannel(realtimeChannel);realtimeChannel=null;}
    await sb.auth.signOut();
  }

  function showAuth(){document.getElementById('globalLoader').style.display='none';document.getElementById('authScreen').style.display='flex';document.getElementById('app').style.display='none';}
  function showApp(){document.getElementById('globalLoader').style.display='none';document.getElementById('authScreen').style.display='none';document.getElementById('app').style.display='grid';}

  // ====== DATA ======
  async function loadData(){
    setSyncStatus('saving');
    try{
      const[evR,ntR,atR]=await Promise.all([
        sb.from('events').select('id,date,content,event_time,notify').order('event_time',{nullsFirst:false}).order('created_at'),
        sb.from('notes').select('date,content'),
        sb.from('attachments').select('id,date,file_name,file_path,file_size,content_type').order('created_at')
      ]);
      if(evR.error)throw evR.error;
      if(ntR.error)throw ntR.error;
      if(atR.error)throw atR.error;

      events={};
      evR.data.forEach(e=>{if(!events[e.date])events[e.date]=[];events[e.date].push(e);});
      notes={};
      ntR.data.forEach(n=>{notes[n.date]=n.content;});
      attachments={};
      atR.data.forEach(a=>{if(!attachments[a.date])attachments[a.date]=[];attachments[a.date].push(a);});

      setSyncStatus('ok');
      renderCalendar(); renderDetail();
    }catch(e){console.error(e);setSyncStatus('offline');}
  }

  // ====== EVENTS CRUD ======
  async function addEvent(){
    const input=document.getElementById('eventInput');
    const text=input.value.trim();
    if(!text)return;
    const time=document.getElementById('eventTime').value||null;
    const notify=document.getElementById('notifyToggle').classList.contains('active');

    setSyncStatus('saving');
    const{data,error}=await sb.from('events')
      .insert({user_id:currentUser.id,date:selectedDate,content:text,event_time:time,notify})
      .select().single();
    if(error){setSyncStatus('offline');console.error(error);return;}

    if(!events[selectedDate])events[selectedDate]=[];
    events[selectedDate].push(data);
    input.value='';
    document.getElementById('eventTime').value='';
    document.getElementById('notifyToggle').classList.remove('active');
    renderDetail(); renderCalendar(); setSyncStatus('ok');
  }

  async function removeEvent(idx){
    const ev=events[selectedDate]?.[idx];
    if(!ev)return;
    setSyncStatus('saving');
    const{error}=await sb.from('events').delete().eq('id',ev.id);
    if(error){setSyncStatus('offline');return;}
    events[selectedDate].splice(idx,1);
    if(!events[selectedDate].length)delete events[selectedDate];
    renderDetail(); renderCalendar(); setSyncStatus('ok');
  }

  // ====== NOTES (Rich Text) ======
  let noteTimer=null;
  function onNoteInput(){
    const el=document.getElementById('notesEditor');
    const val=el.innerHTML;
    const date=selectedDate;
    const clean=el.textContent.trim();

    if(clean)notes[date]=val; else delete notes[date];
    clearTimeout(noteTimer);
    setSyncStatus('saving');
    noteTimer=setTimeout(async()=>{
      try{
        if(clean){
          const{error}=await sb.from('notes').upsert(
            {user_id:currentUser.id,date,content:val,updated_at:new Date().toISOString()},
            {onConflict:'user_id,date'}
          );
          if(error)throw error;
        }else{
          await sb.from('notes').delete().eq('user_id',currentUser.id).eq('date',date);
        }
        setSyncStatus('ok'); renderCalendar();
      }catch(e){console.error(e);setSyncStatus('offline');}
    },600);
  }

  // Toolbar
  function execCmd(cmd){
    document.execCommand(cmd,false,null);
    document.getElementById('notesEditor').focus();
    updateToolbarState();
  }
  function updateToolbarState(){
    document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn=>{
      const active=document.queryCommandState(btn.dataset.cmd);
      btn.classList.toggle('active',active);
    });
  }

  // ====== ATTACHMENTS ======
  async function uploadFiles(files){
    if(!files.length)return;
    setSyncStatus('saving');
    for(const file of files){
      const path=`${currentUser.id}/${selectedDate}/${Date.now()}_${file.name}`;
      const{error:upErr}=await sb.storage.from('attachments').upload(path,file);
      if(upErr){console.error(upErr);setSyncStatus('offline');continue;}

      const{data,error:dbErr}=await sb.from('attachments').insert({
        user_id:currentUser.id, date:selectedDate,
        file_name:file.name, file_path:path,
        file_size:file.size, content_type:file.type
      }).select().single();
      if(dbErr){console.error(dbErr);continue;}
      if(!attachments[selectedDate])attachments[selectedDate]=[];
      attachments[selectedDate].push(data);
    }
    renderDetail(); renderCalendar(); setSyncStatus('ok');
  }

  async function deleteAttachment(idx){
    const att=attachments[selectedDate]?.[idx];
    if(!att)return;
    setSyncStatus('saving');
    await sb.storage.from('attachments').remove([att.file_path]);
    await sb.from('attachments').delete().eq('id',att.id);
    attachments[selectedDate].splice(idx,1);
    if(!attachments[selectedDate].length)delete attachments[selectedDate];
    renderDetail(); renderCalendar(); setSyncStatus('ok');
  }

  function getDownloadUrl(path){
    const{data}=sb.storage.from('attachments').getPublicUrl(path);
    // bucket is private, use createSignedUrl instead
    return null;
  }

  async function downloadAttachment(path, name){
    const{data,error}=await sb.storage.from('attachments').createSignedUrl(path,60);
    if(error){console.error(error);return;}
    const a=document.createElement('a');
    a.href=data.signedUrl; a.download=name; a.target='_blank';
    document.body.appendChild(a); a.click(); a.remove();
  }

  // ====== BROWSER NOTIFICATIONS ======
  function requestNotifPermission(){
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
  }

  function checkNotifications(){
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    const now=new Date();
    const todayKey=fmtDate(now);
    const todayEvents=events[todayKey]||[];

    todayEvents.forEach(ev=>{
      if(!ev.notify||!ev.event_time)return;
      const nKey=ev.id;
      if(notifiedEvents.has(nKey))return;

      const[h,m]=ev.event_time.split(':').map(Number);
      const evTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m);
      const diff=(evTime-now)/60000; // minutes

      if(diff<=15 && diff>-1){
        notifiedEvents.add(nKey);
        new Notification('Calendario',{
          body: (diff<=0?'Adesso: ':'Tra '+Math.round(diff)+' min: ')+ev.content,
          icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📅</text></svg>'
        });
      }
    });
  }

  // ====== REALTIME ======
  function startRealtime(){
    if(realtimeChannel)return;
    realtimeChannel=sb.channel('cal-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'events'},()=>loadData())
      .on('postgres_changes',{event:'*',schema:'public',table:'notes'},()=>loadData())
      .on('postgres_changes',{event:'*',schema:'public',table:'attachments'},()=>loadData())
      .subscribe();
  }

  // ====== RENDER ======
  function renderWeekdays(){
    document.getElementById('weekdays').innerHTML=WD_S.map((w,i)=>`<div class="weekday${i>=5?' weekend':''}">${w}</div>`).join('');
  }

  function renderCalendar(){
    document.getElementById('calTitle').innerHTML=`${MONTHS[viewMonth]} <span class="year">${viewYear}</span>`;
    const first=new Date(viewYear,viewMonth,1);
    const start=new Date(viewYear,viewMonth,1-isoWd(first));
    const grid=document.getElementById('daysGrid');
    grid.innerHTML='';

    for(let i=0;i<42;i++){
      const d=new Date(start); d.setDate(start.getDate()+i);
      const key=fmtDate(d);
      const isOther=d.getMonth()!==viewMonth;
      const isToday=d.getTime()===today.getTime();
      const isSel=key===selectedDate;
      const dayEv=events[key]||[];
      const hasNote=notes[key]&&notes[key].replace(/<[^>]*>/g,'').trim().length>0;
      const hasAttach=attachments[key]&&attachments[key].length>0;

      const cell=document.createElement('div');
      cell.className='day'+(isOther?' other-month':'')+(isToday?' today':'')+(isSel?' selected':'');

      const mx=window.innerWidth<=900?3:2;
      let evH=dayEv.slice(0,mx).map(e=>{
        const t=e.event_time?`<span class="ev-time">${e.event_time}</span>`:'';
        return `<div class="day-event">${t}${esc(e.content)}</div>`;
      }).join('');
      if(dayEv.length>mx) evH+=`<div class="day-more">+${dayEv.length-mx}</div>`;

      cell.innerHTML=`<div class="day-num">${d.getDate()}</div><div class="day-events">${evH}</div>${hasNote?'<div class="has-note-dot"></div>':''}${hasAttach?'<div class="has-attach-dot"></div>':''}`;
      cell.addEventListener('click',()=>selectDay(key));
      grid.appendChild(cell);
    }
  }

  function renderDetail(){
    const d=parseDate(selectedDate);
    document.getElementById('detailWeekday').textContent=WD_L[isoWd(d)];
    document.getElementById('detailDate').innerHTML=`<span class="num">${d.getDate()}</span><span class="month serif">${MONTHS[d.getMonth()].toLowerCase()}</span>`;

    // Events
    const list=document.getElementById('eventsList');
    const dayEv=events[selectedDate]||[];
    if(!dayEv.length){
      list.innerHTML='<div class="empty-events">Nessun impegno per oggi.</div>';
    }else{
      list.innerHTML=dayEv.map((ev,i)=>`
        <div class="event-item">
          <div class="event-bullet${ev.notify?' has-notify':''}"></div>
          ${ev.event_time?`<span class="ev-item-time">${ev.event_time}</span>`:''}
          <div class="event-text">${esc(ev.content)}</div>
          <button class="event-remove" data-idx="${i}">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      `).join('');
      list.querySelectorAll('.event-remove').forEach(b=>b.addEventListener('click',()=>removeEvent(+b.dataset.idx)));
    }

    // Notes
    const editor=document.getElementById('notesEditor');
    editor.innerHTML=notes[selectedDate]||'';

    // Attachments
    const attList=document.getElementById('attachList');
    const dayAtt=attachments[selectedDate]||[];
    if(!dayAtt.length){
      attList.innerHTML='';
    }else{
      attList.innerHTML=dayAtt.map((a,i)=>`
        <div class="attach-item">
          <span class="attach-icon">📎</span>
          <span class="attach-name"><a href="#" data-path="${esc(a.file_path)}" data-name="${esc(a.file_name)}" class="att-link">${esc(a.file_name)}</a></span>
          <span class="attach-size">${fmtSize(a.file_size||0)}</span>
          <button class="attach-del" data-idx="${i}" title="Elimina">
            <svg width="8" height="8" viewBox="0 0 10 10" fill="none"><path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      `).join('');
      attList.querySelectorAll('.att-link').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();downloadAttachment(a.dataset.path,a.dataset.name);}));
      attList.querySelectorAll('.attach-del').forEach(b=>b.addEventListener('click',()=>deleteAttachment(+b.dataset.idx)));
    }
  }

  // ====== ACTIONS ======
  function selectDay(key){
    selectedDate=key;
    const d=parseDate(key);
    if(d.getMonth()!==viewMonth||d.getFullYear()!==viewYear){viewMonth=d.getMonth();viewYear=d.getFullYear();}
    renderCalendar(); renderDetail();
    if(window.innerWidth<=900) document.querySelector('.detail-panel').scrollIntoView({behavior:'smooth',block:'start'});
  }
  function prevMonth(){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderCalendar();}
  function nextMonth(){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderCalendar();}
  function goToday(){viewYear=today.getFullYear();viewMonth=today.getMonth();selectedDate=fmtDate(today);renderCalendar();renderDetail();}

  // ====== LISTENERS ======
  document.getElementById('authLogin').addEventListener('click',handleLogin);
  document.getElementById('authSignup').addEventListener('click',handleSignup);
  document.getElementById('authPassword').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
  document.getElementById('authEmail').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('authPassword').focus();});
  document.getElementById('logoutBtn').addEventListener('click',handleLogout);
  document.getElementById('prevBtn').addEventListener('click',prevMonth);
  document.getElementById('nextBtn').addEventListener('click',nextMonth);
  document.getElementById('todayBtn').addEventListener('click',goToday);
  document.getElementById('addEventBtn').addEventListener('click',addEvent);
  document.getElementById('eventInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addEvent();}});

  // Notify toggle
  document.getElementById('notifyToggle').addEventListener('click',function(){
    this.classList.toggle('active');
    if(this.classList.contains('active')) requestNotifPermission();
  });

  // Rich text toolbar
  document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>execCmd(btn.dataset.cmd));
  });
  document.getElementById('notesEditor').addEventListener('input',onNoteInput);
  document.getElementById('notesEditor').addEventListener('keyup',updateToolbarState);
  document.getElementById('notesEditor').addEventListener('mouseup',updateToolbarState);

  // File upload
  document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change',e=>{uploadFiles(e.target.files);e.target.value='';});

  // Keyboard nav
  document.addEventListener('keydown',e=>{
    if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.isContentEditable)return;
    if(e.key==='ArrowLeft')prevMonth();
    else if(e.key==='ArrowRight')nextMonth();
    else if(e.key==='t'||e.key==='T')goToday();
  });

  let resizeT;
  window.addEventListener('resize',()=>{clearTimeout(resizeT);resizeT=setTimeout(renderCalendar,150);});

  // ====== INIT ======
  async function init(){
    renderWeekdays();
    const{data:{session}}=await sb.auth.getSession();
    if(session){currentUser=session.user;showApp();await loadData();startRealtime();requestNotifPermission();}
    else showAuth();

    sb.auth.onAuthStateChange(async(ev,session)=>{
      if(session&&!currentUser){currentUser=session.user;showApp();await loadData();startRealtime();requestNotifPermission();}
      else if(!session&&currentUser){currentUser=null;events={};notes={};attachments={};if(realtimeChannel){sb.removeChannel(realtimeChannel);realtimeChannel=null;}showAuth();}
    });

    // Check notifications every 30s
    setInterval(checkNotifications,30000);
    checkNotifications();
  }

  init();
</script>
</body>
</html>
